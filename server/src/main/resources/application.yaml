server:
  port: 8081
spring:
  application:
    name: server
  datasource:
    url: jdbc:postgresql://localhost:5435/mydb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
  sql:
    init:
      mode: always
security:
  jwt:
    access:
      timeout: 300
      secretKey: YWhzZGFzZHNkc2Rpd2VyOTU5NDM1ODQzOTU4NDM5NTQzNTQ2NTQ0NTc2Njc=
    refresh:
      timeout: 30
      secretKey: YWhzZGFzZHNkc2RpNzIzNDI1NDA1NDNrYWZqYWRma2RhZmpkYWY=
    reset:
      timeout: 15
      secretKey: YWhzZGFzZHNkc2RpNzIzNDI1NDA1NDNrYWZqYWRma2RhMjM0NDI0
rentflow:
  tai-chinh:
    tien-dam-bao: 1000000
    ty-le-hoa-hong: 0.05
    thoi-han-ky-gui-thang: 6