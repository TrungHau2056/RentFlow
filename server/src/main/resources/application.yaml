spring:
  application:
    name: server
  datasource:
    url: jdbc:postgresql://localhost:5435/mydb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

security:
  jwt:
    access:
      timeout: 300 # minute
      secretKey: YWhzZGFzZHNkc2Rpd2VyOTU5NDM1ODQzOTU4NDM5NTQzNTQ2NTQ0NTc2Njc=
    refresh:
      timeout: 30 # day
      secretKey: YWhzZGFzZHNkc2RpNzIzNDI1NDA1NDNrYWZqYWRma2RhZmpkYWY=
    reset:
      timeout: 15 # minute
      secretKey: YWhzZGFzZHNkc2RpNzIzNDI1NDA1NDNrYWZqYWRma2RhMjM0NDI0